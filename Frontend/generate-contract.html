<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate New Contract | Smart Contract Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="index.html" aria-label="Contract Engine home">Contract Engine</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-main">
        <section class="dashboard-page" aria-labelledby="generate-title">
            <a class="back-button" href="dashboard.html" aria-label="Back to dashboard">Back</a>
            <h1 id="generate-title" class="page-title">Generate New Contract</h1>

            <form class="contract-form" id="contractForm" novalidate>
                <div class="contract-grid">
                    <section class="inputs-column" aria-label="Contract inputs">
                        <div class="field-row">
                            <label for="userId">User ID</label>
                            <input id="userId" name="userId" type="text" placeholder="Enter user ID" required>
                        </div>

                        <div class="field-row">
                            <label for="contractName">Name</label>
                            <input id="contractName" name="contractName" type="text" placeholder="Enter contract name"
                                required>
                        </div>

                        <div class="field-row">
                            <label for="partyOne">Party 1</label>
                            <input id="partyOne" name="partyOne" type="text" placeholder="Enter first party" required>
                        </div>

                        <div class="field-row">
                            <label for="partyTwo">Party 2</label>
                            <input id="partyTwo" name="partyTwo" type="text" placeholder="Enter second party" required>
                        </div>

                        <div class="field-row">
                            <label for="contractType">Type of contract</label>
                            <input id="contractType" name="contractType" type="text"
                                placeholder="e.g. Service Agreement" required>
                        </div>

                        <div class="field-row">
                            <label for="complianceRegime">Compliance regime</label>
                            <select id="complianceRegime" name="complianceRegime" required>
                                <option value="" selected disabled>Select a compliance regime</option>
                                <option value="GDPR">GDPR</option>
                                <option value="HIPAA">HIPAA</option>
                                <option value="ISO 27001">ISO 27001</option>
                                <option value="SOC 2">SOC 2</option>
                            </select>
                        </div>

                        <div class="field-row">
                            <label for="generationModel">Generation model (optional)</label>
                            <select id="generationModel" name="generationModel">
                                <option value="" selected>Use backend default model</option>
                                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
                            </select>
                        </div>
                    </section>

                    <section class="context-column" aria-label="Context input">
                        <label class="context-label" for="contractContext">Context</label>
                        <textarea id="contractContext" name="contractContext" rows="15"
                            placeholder="Enter detailed information about the contract..."></textarea>
                    </section>
                </div>

                <div class="action-row">
                    <button type="submit" class="dashboard-btn">Generate</button>
                </div>

                <p class="form-note" id="formNote" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script>
        (function () {
            const form = document.getElementById("contractForm");
            const note = document.getElementById("formNote");
            const webhookUrl = "http://localhost:5678/webhook/generate-contract";

            function getFilenameFromResponse(response, fallbackName) {
                const contentDisposition = response.headers.get("content-disposition") || "";
                const match = contentDisposition.match(/filename\*=UTF-8''([^;]+)|filename="?([^\";]+)"?/i);
                const rawName = match && (match[1] || match[2]);

                if (rawName) {
                    try {
                        return decodeURIComponent(rawName);
                    } catch (_) {
                        return rawName;
                    }
                }

                return fallbackName;
            }

            async function downloadResponseFile(response, fallbackName) {
                const blob = await response.blob();
                const fileUrl = window.URL.createObjectURL(blob);
                const anchor = document.createElement("a");
                anchor.href = fileUrl;
                anchor.download = getFilenameFromResponse(response, fallbackName);
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
                window.URL.revokeObjectURL(fileUrl);
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();

                const payload = {
                    user_id: document.getElementById("userId").value.trim(),
                    name: document.getElementById("contractName").value.trim(),
                    party1: document.getElementById("partyOne").value.trim(),
                    party2: document.getElementById("partyTwo").value.trim(),
                    contract_type: document.getElementById("contractType").value.trim(),
                    compliance_regime: document.getElementById("complianceRegime").value,
                    context: document.getElementById("contractContext").value.trim()
                };
                const selectedModel = document.getElementById("generationModel").value.trim();

                if (selectedModel) {
                    payload.model = selectedModel;
                }

                if (!payload.user_id || !payload.name || !payload.party1 || !payload.party2 || !payload.contract_type || !payload.compliance_regime) {
                    note.textContent = "Please fill in User ID, Name, Party 1, Party 2, Type of contract, and Compliance regime.";
                    return;
                }

                note.textContent = selectedModel
                    ? `Sending contract request to n8n using model ${selectedModel}...`
                    : "Sending contract request to n8n...";

                try {
                    const response = await fetch(webhookUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(errorText || "Contract request failed.");
                    }

                    await downloadResponseFile(response, `${payload.name.replace(/\s+/g, "_") || "contract"}.pdf`);
                    note.textContent = "Contract generated and downloaded.";
                } catch (error) {
                    note.textContent = error.message || "Unable to download the generated contract.";
                }
            });
        })();
    </script>
</body>

</html>
