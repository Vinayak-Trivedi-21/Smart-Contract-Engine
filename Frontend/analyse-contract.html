<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Contract | Smart Contract Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="index.html" aria-label="Contract Engine home">Contract Engine</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-page">
            <!-- Back Button -->
            <a href="dashboard.html" class="back-button" aria-label="Back to dashboard">← Back</a>

            <!-- Choose Contract Section -->
            <section class="analyse-section" aria-label="Choose contract to analyse">
                <div class="section-head-row">
                    <h2 class="page-title">Choose Contract</h2>
                    <div class="search-group">
                        <label for="contractSearch" class="sr-only">Search contracts</label>
                        <input type="text" id="contractSearch" placeholder="Search your contracts..."
                            class="search-input" aria-label="Search contracts">
                    </div>
                </div>

                <div class="contract-upload-placeholder" role="region" aria-label="Contract selection area">
                    <p>Select or upload a contract to analyse</p>
                </div>
            </section>

            <!-- Options Section -->
            <section class="analyse-options" aria-label="Analysis options">
                <h2 class="page-title">Options</h2>

                <fieldset class="analysis-options-list">
                    <legend class="sr-only">Select analysis types to perform on your contract</legend>

                    <label class="analysis-option">
                        <input type="checkbox" id="benchmarking" name="analysis-type" value="benchmarking"
                            aria-label="Benchmarking and Clause Recommendation">
                        <span class="checkbox-label">
                            <span class="option-title">Benchmarking & Clause Recommendation</span>
                            <span class="option-description">Get insights based on industry benchmarks and receive
                                personalized clause recommendations</span>
                        </span>
                    </label>

                    <label class="analysis-option">
                        <input type="checkbox" id="compliance" name="analysis-type" value="compliance"
                            aria-label="Compliance Check">
                        <span class="checkbox-label">
                            <span class="option-title">Compliance Check</span>
                            <span class="option-description">Verify your contract against regulatory requirements and
                                compliance standards</span>
                        </span>
                    </label>

                    <label class="analysis-option">
                        <input type="checkbox" id="risk" name="analysis-type" value="risk" aria-label="Risk Analysis">
                        <span class="checkbox-label">
                            <span class="option-title">Risk Analysis</span>
                            <span class="option-description">Identify and assess potential risks and liabilities within
                                your contract</span>
                        </span>
                    </label>
                </fieldset>
            </section>

            <!-- Action Button -->
            <div class="action-row">
                <button class="dashboard-btn" aria-label="Start contract analysis">Analyse</button>
            </div>
        </div>
    </main>

</body>

</html>
