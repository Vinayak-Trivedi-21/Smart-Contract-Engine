<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Contracts | Smart Contract Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="index.html" aria-label="Contract Engine home">Contract Engine</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-main">
        <section class="dashboard-page" aria-labelledby="recent-title">
            <a class="back-button" href="dashboard.html" aria-label="Back to dashboard">Back</a>
            <header class="page-head-row">
                <h1 id="recent-title" class="page-title">Recent Contracts</h1>

                <div class="search-group">
                    <label for="searchContracts">Search</label>
                    <input id="searchContracts" type="search" placeholder="Type to search contracts">
                </div>
            </header>

            <section class="recent-contracts-box" aria-label="Recent contracts list">
                <div class="contracts-list" id="contractsList" hidden></div>
                <div class="empty-state" id="emptyState">
                    <p>No uploaded contracts yet.</p>
                </div>
            </section>
        </section>
    </main>

    <script src="recent-contracts.js"></script>

</body>

</html>
