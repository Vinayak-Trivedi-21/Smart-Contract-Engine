<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Contract Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="index.html" aria-label="Contract Engine home">Contract Engine</a>
            <ul class="nav-links">
                <li><a href="index.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero dashboard-hero" aria-label="Dashboard welcome">
            <h1 class="welcome-user" id="welcomeUser">Welcome admin</h1>

            <div class="dashboard-actions" aria-label="Dashboard options">
                <a class="dashboard-action" href="upload-contract.html">Upload Contract</a>
                <a class="dashboard-action" href="analyse-contract.html">Analyse Contract</a>
                <a class="dashboard-action" href="generate-contract.html">Generate Contract</a>
                <a class="dashboard-action" href="recent-contracts.html">Check Repository</a>
            </div>
        </section>
    </main>

    <section class="chatbot-widget" aria-label="Document query chatbot">
        <button type="button" class="chatbot-toggle" id="chatbotToggle" aria-label="Open chatbot"
            aria-controls="chatbotPanel" aria-expanded="false">
            <span aria-hidden="true">Chat</span>
        </button>

        <div class="chatbot-panel" id="chatbotPanel" hidden>
            <header class="chatbot-header">
                <h2>Document Assistant</h2>
                <button type="button" class="chatbot-close" id="chatbotClose"
                    aria-label="Close chatbot">&times;</button>
            </header>

            <div class="chatbot-messages" id="chatbotMessages" aria-live="polite">
                <p class="chatbot-message bot">Ask me questions about your stored documents. I can now answer using
                    Gemini.
                </p>
            </div>

            <form class="chatbot-form" id="chatbotForm">
                <label class="sr-only" for="chatbotInput">Ask a question about stored documents</label>
                <input id="chatbotInput" type="text" placeholder="Ask about clauses, dates, parties..."
                    autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </section>

    <script>
        (function () {
            const welcome = document.getElementById("welcomeUser");
            const savedUser = localStorage.getItem("contractEngineUser");
            const name = savedUser && savedUser.trim() ? savedUser.trim() : "admin";
            welcome.textContent = "Welcome " + name;
        })();
    </script>
    <script src="chatbot-ui.js"></script>
</body>

</html>
